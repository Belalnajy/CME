# نشر تلقائي على GitHub Pages عند الدفع إلى main
#
# إذا فشلت خطوة "Setup Pages" برسالة Get Pages site failed / Not Found:
# 1) Repo على GitHub → Settings → Pages
# 2) قسم "Build and deployment" → Source: اختر "GitHub Actions" (وليس Branch)
# 3) احفظ، ثم Actions → أعد تشغيل السير (Re-run failed jobs) أو ادفع commit جديد
#
# مرجع: https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site#publishing-with-a-custom-github-actions-workflow
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare site (root files only)
        run: |
          mkdir -p _site
          cp index.html logo.jpg _site/

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
