# نشر الموقع على GitHub Pages عبر فرع gh-pages (بدون configure-pages — يتجنب خطأ Not Found)
#
# بعد أول تشغيل ناجح لـ Actions:
# Settings → Pages → Build and deployment → Source: Deploy from a branch
# Branch: gh-pages   Folder: / (root)   ثم Save
#
# إذا كان المصدر حالياً «GitHub Actions» غيّره إلى «Deploy from a branch» كما فوق.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html logo.jpg _site/

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          force_orphan: true
